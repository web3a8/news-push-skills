<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}News Push{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <h1>📰 News Push</h1>
            <nav>
                <a href="{{ url_for('home.index') }}">🏠 首页</a>
                <a href="{{ url_for('articles.list_articles') }}">📰 文章</a>
                <a href="{{ url_for('sources.list_sources') }}">📡 新闻源</a>
                <a href="{{ url_for('settings.settings') }}">⚙️ 设置</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 News Push. MIT License.</p>
        </div>
    </footer>
</body>
</html>
