<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}News Push{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-low": "#131b2e",
                        "secondary-container": "#3c4a5e",
                        "surface-container": "#171f33",
                        "surface-container-lowest": "#060e20",
                        "surface": "#0b1326",
                        "surface-dim": "#0b1326",
                        "surface-container-highest": "#2d3449",
                        "surface-bright": "#31394d",
                        "outline": "#8d90a1",
                        "on-background": "#dae2fd",
                        "primary-container": "#2e67f8",
                        "on-surface-variant": "#c3c5d8",
                        "secondary": "#b9c7df",
                        "outline-variant": "#434655",
                        "tertiary-container": "#007aae",
                        "on-surface": "#dae2fd",
                        "surface-tint": "#b5c4ff",
                        "on-surface-container": "#e1e2f6",
                        "on-primary-container": "#fbf9ff",
                        "on-tertiary-container": "#f6faff",
                        "primary": "#b5c4ff",
                        "tertiary": "#89ceff",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0b1326;
            color: #dae2fd;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b1326; }
        ::-webkit-scrollbar-thumb { background: #171f33; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2d3449; }

        /* Legacy alert styles */
        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .alert-success {
            background-color: #0d3d2e;
            color: #b9f2d0;
            border-left: 4px solid #2e7d58;
        }
        .alert-error {
            background-color: #3d0d1e;
            color: #f2b9d0;
            border-left: 4px solid #7d2e58;
        }
        .alert-warning {
            background-color: #3d2e0d;
            color: #f2e6b9;
            border-left: 4px solid #7d6b2e;
        }
    </style>
</head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-[#0b1326]/80 backdrop-blur-xl shadow-[0_32px_64px_-15px_rgba(6,14,32,0.6)]">
        <div class="flex justify-between items-center px-6 md:px-12 py-3 w-full max-w-7xl mx-auto">
            <div class="text-2xl font-black tracking-tighter text-[#b5c4ff] bg-gradient-to-br from-[#b5c4ff] to-[#2e67f8] bg-clip-text text-transparent font-headline">
                <a href="{{ url_for('home.index') }}" class="hover:opacity-90 transition-opacity">News Push</a>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a class="text-[#b5c4ff] relative after:absolute after:bottom-[-4px] after:left-0 after:w-full after:h-0.5 after:bg-[#2e67f8] font-headline font-bold tracking-tight text-lg" href="{{ url_for('home.index') }}">首页</a>
            </nav>
        </div>
    </header>

    <main class="pt-24 pb-12 px-6 md:px-12 max-w-7xl mx-auto">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="mt-12 py-12 border-t border-outline-variant/5 bg-surface-container-lowest">
        <div class="max-w-7xl mx-auto px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-on-surface-variant text-sm font-label">
                © 2025 News Push. MIT License.
            </div>
            <div class="flex gap-8 text-sm font-medium text-secondary">
                <a class="hover:text-primary transition-colors" href="https://github.com/yourusername/news-push-skill" target="_blank">GitHub</a>
                <a class="hover:text-primary transition-colors" href="#">Documentation</a>
            </div>
        </div>
    </footer>
</body>
</html>
